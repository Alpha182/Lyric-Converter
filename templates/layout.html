<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Lyric Aligner{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='%234aa3e8'%3E%3Crect x='3' y='10' width='3' height='8' rx='1.5'/%3E%3Crect x='8' y='5' width='3' height='13' rx='1.5'/%3E%3Crect x='13' y='8' width='3' height='10' rx='1.5'/%3E%3Crect x='18' y='12' width='3' height='6' rx='1.5'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<aside class="side">
  <a class="brand" href="/">
    <span class="brand-mark"><i></i><i></i><i></i><i></i></span>
    <span>Lyric&nbsp;Aligner</span>
  </a>
  <nav class="nav">
    <div class="nav-label">Library</div>
    <a class="nav-item {% if page == 'songs' %}active{% endif %}" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Songs
    </a>
    <div class="nav-label">Tools</div>
    <a class="nav-item {% if page == 'generate' %}active{% endif %}" href="/generate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M8 8v8"/><path d="M4 11v2"/><path d="M16 6v12"/><path d="M20 10v4"/></svg>
      Generate
    </a>
  </nav>
  <div class="side-foot">
    <span class="dot"></span> running locally
    <div class="side-foot-sub">127.0.0.1:8770</div>
  </div>
</aside>
<main class="main">
{% block content %}{% endblock %}
</main>
</body>
</html>
