{% extends "layout.html" %}
{% block title %}Songs · Lyric Aligner{% endblock %}
{% block content %}
<header class="page-head reveal">
  <div class="eyebrow">Library</div>
  <h1>Your songs</h1>
  <div class="stat-line" id="stats"></div>
</header>

<div class="toolbar reveal">
  <label class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="q" type="search" placeholder="Search title, artist or ID…" autocomplete="off">
  </label>
  <select id="sort" aria-label="Sort songs">
    <option value="added">Newest first</option>
    <option value="title">Title A–Z</option>
    <option value="rating">Highest rated</option>
    <option value="duration">Longest</option>
  </select>
  <div class="seg" role="group" aria-label="View">
    <button id="view-grid" title="Grid view" aria-label="Grid view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.5"/></svg>
    </button>
    <button id="view-list" title="List view" aria-label="List view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
  <span class="count" id="count"></span>
</div>

<ul class="grid" id="list">
  {% for _ in range(10) %}
  <li class="card skel">
    <div class="art shimmer"></div>
    <span class="shimmer skel-line"></span>
    <span class="shimmer skel-line short"></span>
  </li>
  {% endfor %}
</ul>

<script src="/static/songs.js"></script>
{% endblock %}
